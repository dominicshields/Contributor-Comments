{% extends "base.html" %}
{% block title %}Help | Contributor Comments{% endblock %}

{% block extra_css %}
<style>
.help-content {
    white-space: pre-wrap;
}
</style>
{% endblock %}

{% block content %}
<header class="ons-page-header">
    <h1 class="ons-page-title">Help</h1>
    <p class="ons-page-lead">How to use Contributor Comments day to day.</p>
</header>

{% if current_user.is_admin %}
<div class="mb-3">
    <a class="btn btn-outline-secondary" href="{{ url_for('comments.edit_help_page') }}">Edit Help Page</a>
</div>
{% endif %}

<section>
    <div class="card">
        <div class="card-body help-content">{{ help_content }}</div>
    </div>
</section>
{% endblock %}
